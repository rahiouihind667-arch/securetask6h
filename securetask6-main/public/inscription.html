<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SecureTask — Inscription</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <link rel="stylesheet" href="style.css">
</head>

<body data-page="register">

<div class="login-page">

  <div class="login-card">

    <div class="login-logo">
      <div class="logo-icon-lg">📝</div>

      <div class="logo-title">
        Secure<span>Task</span>
      </div>

      <div class="logo-sub">
        Créer un compte
      </div>
    </div>

    <div
      id="register-error"
      class="login-error"
      style="display:none;"
    ></div>

    <div
      id="register-success"
      class="login-error"
      style="background:#d1fae5;color:#065f46;border-color:#6ee7b7;display:none;"
    ></div>

    <form id="register-form">

      <div class="form-group">
        <label class="form-label" for="nom">
          Nom complet
        </label>

        <input
          type="text"
          id="nom"
          class="form-control"
          placeholder="Jean Dupont"
          required
        >
      </div>

      <div class="form-group">
        <label class="form-label" for="email">
          Adresse email
        </label>

        <input
          type="email"
          id="email"
          class="form-control"
          placeholder="vous@securetask.ma"
          required
        >
      </div>

      <div class="form-group">
        <label class="form-label" for="password">
          Mot de passe
        </label>

        <input
          type="password"
          id="password"
          class="form-control"
          placeholder="••••••••"
          required
        >
      </div>

      <div class="form-group">
        <label class="form-label" for="confirm-password">
          Confirmer le mot de passe
        </label>

        <input
          type="password"
          id="confirm-password"
          class="form-control"
          placeholder="••••••••"
          required
        >
      </div>
      <div class="form-group">
        <label class="form-label" for="role">
          Sélectionnez votre rôle
        </label>
        <select
          id="role"
          class="form-control"
          required
        >
          <option value="">-- Choisir un rôle --</option>
          <option value="Leader">Leader</option>
          <option value="Ingenieur SSI">Ingénieur SSI</option>
          <option value="Observateur">Observateur</option>
          <option value="Consultant">Consultant</option>
          <option value="Manager">Manager</option>
        </select>
      </div>

      <div class="form-group">
        <label class="form-label" for="code-acces">
          Code d'accès
        </label>
        <input
          type="text"
          id="code-acces"
          class="form-control"
          placeholder="XXXX-XXXX-0000"
          maxlength="14"
          required
        >
      </div>
      <button
        type="submit"
        class="btn btn-primary"
        style="width:100%;justify-content:center;padding:12px;"
      >
        ✅ Créer mon compte
      </button>

    </form>

    <div class="login-links" style="margin-top:20px;">
      <a href="connexion.html">
        ← Déjà un compte ? Se connecter
      </a>
    </div>

  </div>

</div>

<div id="toast-container" class="toast-container"></div>

<script src="main.js"></script>

</body>
</html>
