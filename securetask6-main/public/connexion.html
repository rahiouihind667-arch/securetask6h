<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SecureTask</title>

  <!-- ── FONTS Google ── -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

  <!-- ── FONT AWESOME (icônes) ── -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <!-- ── ANIMATE.CSS (animations) ── -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">

  <!-- ── TON CSS ── -->
  <link rel="stylesheet" href="style.css">
</head>
<body data-page="login">

<div class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <div class="logo-icon-lg">🔐</div>
      <div class="logo-title">Secure<span>Task</span></div>
      <div class="logo-sub">Plateforme de gestion SSI</div>
    </div>

    <div id="login-error" class="login-error"></div>

    <form id="login-form">
      <div class="form-group">
        <label class="form-label" for="email">Adresse email</label>
       <input type="email" id="email" class="form-control" placeholder="vous@securetask.ma" required>
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Mot de passe</label>
        <input type="password" id="password" class="form-control" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:12px;">
        🔓 Se connecter
      </button>
    </form>

    <div class="login-links" style="margin-top:20px; text-align: right;">
        <a href="inscription.html">Créer un compte</a>
    </div>
  </div>
</div>

<div id="toast-container" class="toast-container"></div>
<script src="main.js"></script>
</body>
</html>
